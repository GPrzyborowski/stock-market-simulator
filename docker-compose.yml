services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydb']
      interval: 5s
      timeout: 5s
      retries: 5

  app1:
    build: .
    command: ['node', 'dist/app.js', '3001']
    environment:
      DB_USER: myuser
      DB_PASSWORD: 123
      DB_NAME: mydb
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  app2:
    build: .
    command: ['node', 'dist/app.js', '3002']
    environment:
      DB_USER: myuser
      DB_PASSWORD: 123
      DB_NAME: mydb
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - '${APP_PORT:-8080}:80'
    depends_on:
      - app1
      - app2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

volumes:
  postgres_data:
